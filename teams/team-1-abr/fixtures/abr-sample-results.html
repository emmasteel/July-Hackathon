<!--
  STATIC SAMPLE MARKUP — for accessibility analysis practice ONLY.

  This is a deliberately imperfect, simplified imitation of an ABR-style search
  results page. It is NOT copied from the live site and must never be used to
  represent the real ABR. Use it to practise spotting WCAG 2.2 AA issues in the
  accessibility worksheet — several problems are planted here on purpose.

  DO NOT fetch or scrape abr.business.gov.au. Everything you need is in this file
  and in fixtures/abn-sample-data.json.

  Planted issues to find (don't peek until you've tried!):
   1. The search field is labelled by placeholder only — no <label>. (1.3.1/3.3.2)
   2. The "Search" control is a <div onclick>, not a <button> — not keyboard operable. (2.1.1/4.1.2)
   3. Low-contrast helper text (#aaaaaa on white). (1.4.3)
   4. Status shown by colour alone (green/red dot, no text). (1.4.1)
   5. Result count updates with no live-region announcement. (4.1.3)
   6. Heading levels skip from h1 to h3. (1.3.1)
   7. Decorative image missing alt="" (announced as noise). (1.1.1)
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ABR-style sample results (for accessibility practice)</title>
    <style>
      .hint { color: #aaaaaa; } /* issue 3: low contrast */
      .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
      .dot-active { background: green; }   /* issue 4: colour-only status */
      .dot-cancelled { background: red; }
      .fake-button { background: #00558b; color: #fff; padding: 8px 16px; display: inline-block; }
    </style>
  </head>
  <body>
    <h1>Business lookup</h1>

    <!-- issue 7: decorative image with no alt -->
    <img src="divider.png" />

    <!-- issue 1: placeholder-only labelling, no <label> -->
    <input type="text" placeholder="Enter ABN or business name" />
    <p class="hint">Tip: enter the 11-digit ABN.</p>

    <!-- issue 2: div acting as a button, not keyboard operable -->
    <div class="fake-button" onclick="doSearch()">Search</div>

    <!-- issue 5: this count changes after a search but is not in an aria-live region -->
    <p id="result-count">3 results</p>

    <!-- issue 6: heading jumps from h1 to h3 -->
    <h3>Results</h3>
    <ul>
      <li>
        Example Manufacturing Pty Ltd
        <span class="dot dot-active" title="Active"></span>
      </li>
      <li>
        Sample Retail Group Ltd
        <span class="dot dot-active" title="Active"></span>
      </li>
      <li>
        Dormant Holdings
        <span class="dot dot-cancelled" title="Cancelled"></span>
      </li>
    </ul>
  </body>
</html>
