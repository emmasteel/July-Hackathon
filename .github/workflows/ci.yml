# Starter CI — kept intentionally minimal. Teams extend this in stretch goal S3 (CI/CD)
# and S1 (security scanning). It runs build + unit tests for BOTH team tracks.
#
# 〔TODO — organiser: confirm the .NET version matches PREREQUISITES.md, and enable the
#  optional scanning jobs once you're happy with them (see the commented blocks below).〕

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & unit test (${{ matrix.team }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        team:
          - teams/team-1-abr
          - teams/team-2-grant-finder
    defaults:
      run:
        working-directory: ${{ matrix.team }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x # 〔TODO: confirm (8.0 LTS)〕

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit tests
        run: dotnet test --no-build --configuration Release

